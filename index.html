<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶貝我愛你童裝 - 門市社群</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Microsoft JhengHei", "PingFang TC", sans-serif;
            min-height: 100vh;
            min-height: -webkit-fill-available;
            background: url('images/bg.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex;
            justify-content: center;
            padding: 16px 12px;
            padding-bottom: calc(16px + env(safe-area-inset-bottom));
        }

        .container {
            max-width: 500px;
            width: 100%;
            text-align: center;
            padding: 20px 0;
        }

        .logo {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            background: #ffffff;
            border-radius: 50px;
            padding: 16px 20px;
            min-height: 56px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            transition: transform 0.15s, box-shadow 0.15s;
            cursor: pointer;
        }

        .btn-link:active {
            transform: scale(0.97);
            background: #f5f5f5;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            margin-right: 14px;
            flex-shrink: 0;
        }

        .btn-text {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            text-align: left;
            line-height: 1.4;
        }

        .btn-line {
            border-left: 5px solid #06C755;
        }

        .btn-fb {
            border-left: 5px solid #1877F2;
        }

        .section-title {
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            margin: 24px 0 12px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }

        /* 說明文字區塊 */
        .info-card {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 24px 20px;
            margin-bottom: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.15);
            text-align: left;
        }

        .info-card h1 {
            font-size: 24px;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
        }

        .info-card .subtitle {
            font-size: 15px;
            color: #666;
            text-align: center;
            margin-bottom: 20px;
            line-height: 1.7;
        }

        .info-card h2 {
            font-size: 17px;
            color: #333;
            margin: 18px 0 10px;
        }

        .info-card ul {
            list-style: none;
            padding: 0;
        }

        .info-card ul li {
            font-size: 15px;
            color: #444;
            padding: 5px 0;
            line-height: 1.6;
        }

        .info-card .notice {
            font-size: 14px;
            color: #666;
            line-height: 1.7;
            margin-top: 6px;
        }

        .icon-line {
            background: #06C755;
            border-radius: 8px;
            padding: 5px;
        }

        .icon-fb {
            background: #1877F2;
            border-radius: 8px;
            padding: 5px;
        }

        /* ===== 電腦版微調（螢幕寬度 > 600px） ===== */
        @media (min-width: 600px) {
            body { padding: 30px 20px; }
            .btn-link:hover {
                transform: translateY(-2px);
                box-shadow: 0 5px 20px rgba(0,0,0,0.25);
            }
            .btn-link:active { transform: translateY(0); }
        }
    </style>
</head>
